<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <title>Gerenciador de Usuários · Cadastro de usuários</title>
    </head>

    <body>
        <div class="sign-up-container">
            <h2>Novo usuário</h2>
            <p>Por favor, preencha todos os campos abaixo.</p>            
            <input type="text" id="full-name" placeholder="Nome completo">
            <input type="text" id="date-of-birth" placeholder="DD/MM/YYYY" maxlength="10">
            <input type="text" id="phone-number" placeholder="(__)_____-____">
            <input type="text" id="email" placeholder="Email">

            <button onclick="register()">Cadastrar</button>
            <button id="btn-back" onclick="window.location.href='main-page.html'">Voltar</button>
        </div>
        <script src="script.js"></script>
    </body>
</html>
